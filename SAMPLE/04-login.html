<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 · 경리AGENT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/variable/pretendardvariable.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <style>
    /* ============ TOKENS (Dashboard_3 Warm Cream + Terracotta) ============ */
    :root {
      --bg:          #F6F2EA;
      --bg-2:        #EFEADE;
      --surface:     #FFFDF8;
      --surface-2:   #FAF6EE;
      --line:        #E8E1D0;
      --line-soft:   #F0EADC;

      --ink:         #1F1B16;
      --ink-2:       #3A342B;
      --muted:       #7A7266;
      --muted-2:     #A69E8F;

      --accent:      #D97757;
      --accent-ink:  #A94D2C;
      --accent-soft: #F4D9CA;
      --accent-tint: #FBEFE7;

      --moss:        #5B8770;
      --moss-tint:   #E8F0EB;
      --rose:        #B85464;

      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 18px;
      --r-xl: 24px;
      --r-pill: 999px;

      --sh-sm: 0 2px 8px rgba(60, 40, 20, 0.05), 0 1px 2px rgba(60, 40, 20, 0.04);
      --sh-md: 0 8px 24px rgba(60, 40, 20, 0.06), 0 2px 4px rgba(60, 40, 20, 0.04);
      --sh-lg: 0 20px 48px rgba(60, 40, 20, 0.10), 0 4px 8px rgba(60, 40, 20, 0.05);

      --ease: cubic-bezier(.2,.7,.2,1);

      --font-kr: 'Pretendard Variable', Pretendard, -apple-system, system-ui, sans-serif;
      --font-num: 'Inter', var(--font-kr);
    }

    /* ============ RESET / BASE ============ */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-kr);
      background: var(--bg);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.005em;
      word-break: keep-all;
    }
    button { font-family: inherit; background: none; border: 0; cursor: pointer; color: inherit; }
    a { color: inherit; text-decoration: none; }
    input { font-family: inherit; font-size: inherit; }

    /* ============ SCREEN FRAME (mobile-first) ============ */
    .screen-frame {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background:
        radial-gradient(ellipse at top left, var(--accent-tint) 0%, transparent 55%),
        radial-gradient(ellipse at bottom right, var(--moss-tint) 0%, transparent 55%),
        var(--bg);
      position: relative;
    }

    /* ============ PHONE CARD ============ */
    .phone {
      width: 100%;
      max-width: 440px;
      min-height: 760px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-xl);
      box-shadow: var(--sh-lg);
      padding: 56px 28px 28px;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    /* ============ BRAND MARK ============ */
    .brand-mark {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
    }
    .brand-logo-wrap {
      width: 72px; height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-ink) 100%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 8px 24px rgba(217, 119, 87, 0.30),
        inset 0 -2px 0 rgba(0, 0, 0, 0.10);
      margin-bottom: 18px;
      position: relative;
      overflow: hidden;
    }
    .brand-logo-wrap::before {
      content: '';
      position: absolute;
      top: -30%; left: -20%; right: -20%;
      height: 60%;
      background: linear-gradient(180deg, rgba(255, 253, 248, 0.32), transparent);
      transform: rotate(-6deg);
    }
    .brand-logo-wrap svg { position: relative; z-index: 1; color: var(--surface); }

    .logo {
      font-size: 26px;
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -0.03em;
      line-height: 1.2;
    }
    .logo .logo-accent {
      color: var(--accent);
      font-weight: 900;
      letter-spacing: -0.04em;
      margin-left: 3px;
    }
    .welcome-sub {
      font-size: 13.5px;
      color: var(--muted);
      text-align: center;
      margin-top: 6px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    /* ============ FIELDS ============ */
    .field { position: relative; margin-bottom: 14px; }
    .input {
      width: 100%;
      height: 54px;
      padding: 0 16px;
      border-radius: var(--r-md);
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--ink);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.01em;
      transition: border-color .18s var(--ease), background .18s var(--ease), box-shadow .18s var(--ease);
      outline: 0;
    }
    .input::placeholder { color: var(--muted-2); font-weight: 500; }
    .input:hover { border-color: var(--muted-2); }
    .input:focus {
      border-color: var(--accent);
      background: var(--surface);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .pin-mask {
      font-family: var(--font-num);
      font-size: 18px;
      letter-spacing: 0.5em;
      padding-right: 0;
      font-weight: 700;
    }
    .pin-mask::placeholder {
      letter-spacing: -0.01em;
      font-size: 15px;
      font-family: var(--font-kr);
      font-weight: 500;
    }

    /* ============ PRIMARY BUTTON ============ */
    .btn-primary {
      width: 100%;
      height: 54px;
      margin-top: 8px;
      background: var(--accent);
      color: var(--surface);
      border: 0;
      border-radius: var(--r-md);
      font-family: var(--font-kr);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.02em;
      cursor: pointer;
      transition: filter .15s var(--ease), transform .15s var(--ease), box-shadow .15s var(--ease);
      box-shadow: 0 2px 6px rgba(217, 119, 87, 0.24);
    }
    .btn-primary:hover {
      filter: brightness(1.04);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(217, 119, 87, 0.32);
    }
    .btn-primary:active { transform: translateY(0); filter: brightness(0.97); }

    /* ============ HELPER LINKS ============ */
    .helper-links {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 20px;
      font-size: 13px;
      font-weight: 600;
    }
    .helper-links a {
      color: var(--muted);
      transition: color .15s var(--ease);
      padding: 4px 2px;
      letter-spacing: -0.01em;
    }
    .helper-links a:hover { color: var(--accent); }
    .helper-links .divider {
      width: 1px;
      height: 10px;
      background: var(--line);
    }

    /* ============ OR DIVIDER ============ */
    .divider-text {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0 18px;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--muted-2);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .divider-text::before,
    .divider-text::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    /* ============ BIOMETRIC BUTTON ============ */
    .bio-btn {
      width: 100%;
      height: 54px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      color: var(--ink-2);
      background: var(--surface);
      font-family: var(--font-kr);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: -0.01em;
      transition: all .18s var(--ease);
    }
    .bio-btn:hover {
      background: var(--accent-tint);
      border-color: var(--accent-soft);
      color: var(--accent-ink);
      transform: translateY(-1px);
      box-shadow: var(--sh-sm);
    }
    .bio-btn svg { color: var(--accent); transition: color .15s var(--ease); }
    .bio-btn:hover svg { color: var(--accent-ink); }

    /* ============ TRUST ROW ============ */
    .trust-row {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin: 32px auto 0;
      padding: 6px 12px;
      font-size: 11.5px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: -0.01em;
      background: var(--moss-tint);
      border-radius: var(--r-pill);
      align-self: center;
    }
    .trust-row svg { color: var(--moss); }

    /* ============ RESPONSIVE ============ */
    @media (max-width: 480px) {
      .screen-frame { padding: 0; }
      .phone {
        min-height: 100vh;
        border-radius: 0;
        border: 0;
        box-shadow: none;
        padding: 48px 22px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="screen-frame">
    <div class="phone">
      <div class="brand-mark">
        <div class="brand-logo-wrap" aria-hidden="true">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2 L13.8 9.2 L21 11 L13.8 12.8 L12 20 L10.2 12.8 L3 11 L10.2 9.2 Z"/>
            <circle cx="18.5" cy="5.5" r="1.6" opacity="0.85"/>
            <circle cx="5.5" cy="18.2" r="1.2" opacity="0.65"/>
          </svg>
        </div>
        <div class="logo">경리<span class="logo-accent">AGENT</span></div>
        <div class="welcome-sub">AI가 장부를 씁니다, 당신은 매장을 지키세요</div>
      </div>

      <div class="field">
        <input
          class="input"
          type="text"
          inputmode="numeric"
          placeholder="사업자번호"
          maxlength="12"
          data-format="biz-no"
          autocomplete="username"
        />
      </div>

      <div class="field">
        <input
          class="input pin-mask"
          type="password"
          inputmode="numeric"
          placeholder="간편비밀번호 (6자리)"
          maxlength="6"
          autocomplete="current-password"
        />
      </div>

      <button class="btn-primary" onclick="location.href='10-dashboard.html'">로그인</button>

      <div class="helper-links">
        <a href="01-signup-bizno.html">회원가입</a>
        <span class="divider"></span>
        <a href="05-find-password.html">비밀번호 찾기</a>
      </div>

      <div class="trust-row">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <polyline points="9 12 11 14 15 10"/>
        </svg>
        은행급 보안 · 금융위 등록 서비스
      </div>
    </div>
  </div>
</body>
</html>
